name: Backend CI

on:
  pull_request:
    paths:
      - 'src/backend/**'
      - '.github/workflows/backend-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('src/backend/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore src/backend/ConferenceExample.sln

      - name: Build
        run: dotnet build src/backend/ConferenceExample.sln --no-restore --configuration Release

      - name: Test
        run: |
          dotnet test src/backend/Conference/ConferenceExample.Conference.Domain.UnitTests --no-build --configuration Release
          dotnet test src/backend/Conference/ConferenceExample.Conference.Application.UnitTests --no-build --configuration Release
          dotnet test src/backend/Conference/ConferenceExample.Conference.Persistence.UnitTests --no-build --configuration Release
          dotnet test src/backend/Talk/ConferenceExample.Talk.Domain.UnitTests --no-build --configuration Release
          dotnet test src/backend/Talk/ConferenceExample.Talk.Application.UnitTests --no-build --configuration Release
          dotnet test src/backend/Talk/ConferenceExample.Talk.Persistence.UnitTests --no-build --configuration Release
          dotnet test src/backend/Infrastructure/ConferenceExample.EventStore.UnitTests --no-build --configuration Release
          dotnet test src/backend/Infrastructure/ConferenceExample.Authentication.UnitTests --no-build --configuration Release
