name: Backend CI

on:
  pull_request:
    paths:
      - 'src/backend/**'
      - '.github/workflows/backend-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('src/backend/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore src/backend/ConferenceExample.sln

      - name: Build
        run: dotnet build src/backend/ConferenceExample.sln --no-restore

      - name: Test
        run: dotnet test src/backend/ConferenceExample.sln --no-build --logger "github-actions;summary.includePassedTests=false"
