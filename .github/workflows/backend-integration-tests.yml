name: Backend Integration Tests

on:
  workflow_dispatch:

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('src/backend/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore src/backend/Tests/ConferenceExample.IntegrationTests

      - name: Build
        run: dotnet build src/backend/Tests/ConferenceExample.IntegrationTests --no-restore --configuration Release

      - name: Test
        run: dotnet test src/backend/Tests/ConferenceExample.IntegrationTests --no-build --configuration Release --logger "github-actions;summary.includePassedTests=false"
