name: Backend Integration Tests

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('src/backend/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore src/backend/ConferenceExample.sln

      - name: Build
        run: dotnet build src/backend/ConferenceExample.sln --no-restore --configuration Release

      - name: Test
        run: |
          dotnet test src/backend/Talk/ConferenceExample.Talk.AcceptanceTests --no-build --configuration Release
          dotnet test src/backend/Tests/ConferenceExample.IntegrationTests --no-build --configuration Release
